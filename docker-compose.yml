services:
  db:
    image: postgres:16
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql  

  backend:
    build: ./Proyecto2BasedeDatos-Backend
    restart: always
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build: ./Proyecto2BasedeDatos-Frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: